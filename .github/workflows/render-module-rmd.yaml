## Render this module's manual (anthroDisturbance_Generator.Rmd -> .md, github_document)
## and commit the result. Rendering only needs SpaDES.core + rmarkdown + knitr (+ pandoc):
## the manual's chunks parse the module metadata, they do NOT run the module, so the
## module's reqdPkgs are not required. This avoids the old (broken) Require/full-SpaDES
## install path. Runs on pushes to `main` that touch the manual or module source.
name: Render module Rmd

on:
  push:
    branches:
      - main
    paths:
      - .github/workflows/render-module-rmd.yaml
      - anthroDisturbance_Generator.Rmd
      - anthroDisturbance_Generator.R
  workflow_dispatch:

permissions:
  contents: write

jobs:
  render:
    if: "!contains(github.event.head_commit.message, '[skip-ci]')"
    name: Render module Rmd
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: r-lib/actions/setup-pandoc@v2

      - uses: r-lib/actions/setup-r@v2
        with:
          use-public-rspm: true

      - uses: r-lib/actions/setup-r-dependencies@v2
        with:
          ## PredictiveEcology dev packages break often -- pin exact SHAs to match
          ## YT_caribou renv.lock (bump these in sync with the project lockfile).
          packages: |
            any::rmarkdown
            any::knitr
            github::PredictiveEcology/Require@0473223cdf73c1a8da6d8ec3a7e3b12b0cbb0da3
            github::PredictiveEcology/quickPlot@b773db66d73e28e369a61090a2798fd544de082b
            github::PredictiveEcology/reproducible@4248b74f72dd7acdd03ebf5486c2febe75bf6d22
            github::PredictiveEcology/SpaDES.core@adc15591358cc9d69d58120173380d03f03d0662

      - name: Render manual
        run: rmarkdown::render("anthroDisturbance_Generator.Rmd", encoding = "UTF-8")
        shell: Rscript {0}

      - name: Commit rendered manual
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add anthroDisturbance_Generator.md
          if git diff --staged --quiet; then
            echo "No changes to commit."
          else
            git commit -m "Re-build anthroDisturbance_Generator.md [skip-ci]"
            git push
          fi
